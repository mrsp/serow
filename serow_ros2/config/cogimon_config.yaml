robot_name: "cogimon"
path_to_serow_library: "/usr/local/lib"
topics:
  joint_states: "/joint_states"
  imu: "/imu"
  force_torque_states:
    - "/force_torque_states/LFoot"
    - "/force_torque_states/RFoot"
  ground_truth: "/ground_truth/odom"
  external_odometry: ""
synchronization:
  imu_to_joint: 0.01
  force_torque_to_joint: 0.02
  ground_truth_to_joint: 0.01
serow_config: "cogimon.json" 
publish_path: false
